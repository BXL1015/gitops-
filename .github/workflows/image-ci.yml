name: Build Container Image

on:
  push:
    branches:
      - master
      - dev
  workflow_dispatch:
    inputs:
      set_env:
        description: "Optional SET environment number for tagging, for example 4"
        required: false
        type: string
      image_tag:
        description: "Optional explicit image tag"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          short_sha="${GITHUB_SHA::7}"

          explicit_tag="${{ inputs.image_tag }}"
          set_env="${{ inputs.set_env }}"
          if [ -n "$explicit_tag" ]; then
            tag="$explicit_tag"
          elif [ -n "$set_env" ]; then
            tag="set-${set_env}-${short_sha}"
          else
            tag="${GITHUB_REF_NAME}-${short_sha}"
          fi

          {
            echo "image=$image"
            echo "tag=$tag"
            echo "branch_tag=${GITHUB_REF_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.branch_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
