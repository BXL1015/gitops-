name: Build Container Image

on:
  push:
    branches:
      - main
      - master
      - dev
  workflow_dispatch:
    inputs:
      services:
        description: "Optional override, for example svc3,svc4. Empty means auto-detect changed services."
        required: false
        type: string
      set_env:
        description: "Optional SET environment number for image tag, for example 4"
        required: false
        type: string
      image_tag:
        description: "Optional explicit image tag"
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Prepare build plan
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"

          explicit_tag="${{ inputs.image_tag }}"
          set_env="${{ inputs.set_env }}"
          if [ -n "$explicit_tag" ]; then
            tag="$explicit_tag"
          elif [ -n "$set_env" ]; then
            tag="set-${set_env}-${short_sha}"
          else
            tag="${GITHUB_REF_NAME}-${short_sha}"
          fi

          override_services="${{ inputs.services }}"
          if [ -n "$override_services" ]; then
            programs="$(echo "$override_services" | tr ',' ' ' | xargs)"
          else
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              base="${{ github.event.pull_request.base.sha }}"
            elif git rev-parse HEAD^ >/dev/null 2>&1; then
              base="HEAD^"
            else
              base="$(git hash-object -t tree /dev/null)"
            fi

            changed="$(git diff --name-only "$base" HEAD)"
            programs=""

            if echo "$changed" | grep -qE '^(internal/|go\.mod$|Dockerfile$)'; then
              programs="registry tenant-lookup svc1 svc2 svc3 svc4 svc5 svc6 svc7 svc8 svc9 svc10 svc11 svc12 svc13 svc14 svc15"
            else
              for app in registry tenant-lookup svc1 svc2 svc3 svc4 svc5 svc6 svc7 svc8 svc9 svc10 svc11 svc12 svc13 svc14 svc15; do
                if echo "$changed" | grep -qE "^${app}/"; then
                  programs="$programs $app"
                fi
              done
            fi

            programs="$(echo "$programs" | xargs)"
          fi

          if [ -z "$programs" ]; then
            echo "No service code changes detected."
            echo "programs=" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "branch_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "tag=$tag"
            echo "branch_tag=${GITHUB_REF_NAME}"
            echo "programs=$programs"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        if: ${{ steps.meta.outputs.programs != '' }}
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ steps.meta.outputs.programs != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push selected images
        if: ${{ steps.meta.outputs.programs != '' }}
        shell: bash
        run: |
          # 使用你在 Docker Hub 的账号前缀
          owner="hcbxl" 
          for app in ${{ steps.meta.outputs.programs }}; do
            case "$app" in
              registry|tenant-lookup|svc1|svc2|svc3|svc4|svc5|svc6|svc7|svc8|svc9|svc10|svc11|svc12|svc13|svc14|svc15) ;;
              *) echo "invalid service/program: $app" >&2; exit 1 ;;
            esac

            # 全部塞进 hcbxl/argocd 仓库，用 Tag 区分服务
            image="hcbxl/argocd"
            docker buildx build \
              --push \
              --platform linux/amd64 \
              --build-arg "APP=${app}" \
              -t "${image}:${app}-${{ steps.meta.outputs.tag }}" \
              -t "${image}:${app}-${{ steps.meta.outputs.branch_tag }}" \
              .
          done
