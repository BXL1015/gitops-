name: 一键创建 SET 实验泳道环境

on:
  workflow_dispatch:
    inputs:
      set_env:
        description: "SET environment number to create, for example 3"
        required: true
        type: string
        default: "8"
      services:
        description: "Services to create. Empty means hot services: svc3,svc4,svc5,svc6,svc7,svc8"
        required: false
        type: string
      image_tag:
        description: "Image tag for the new environment. Empty means dev"
        required: false
        type: string
        default: "dev"
      overwrite:
        description: "Overwrite existing k8s/envs/envN files"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  create-environment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate SET manifests
        id: generate
        shell: bash
        run: |
          set -euo pipefail

          set_env="${{ inputs.set_env }}"
          services="${{ inputs.services }}"
          image_tag="${{ inputs.image_tag }}"
          overwrite="${{ inputs.overwrite }}"
          owner="${GITHUB_REPOSITORY_OWNER,,}"

          if ! echo "$set_env" | grep -qE '^[0-9]+$'; then
            echo "set_env must be a number, got: $set_env" >&2
            exit 1
          fi

          if [ "$set_env" = "0" ]; then
            echo "env 0 is the baseline. Use a SET env number greater than 0." >&2
            exit 1
          fi

          if [ -z "$services" ]; then
            services="svc3,svc4,svc5,svc6,svc7,svc8"
          fi
          if [ -z "$image_tag" ]; then
            image_tag="master"
          fi

          programs="$(echo "$services" | tr ',' ' ' | xargs)"
          target_dir="k8s/env${set_env}"

          if [ -d "$target_dir" ] && [ "$overwrite" != "true" ]; then
            echo "$target_dir already exists. Set overwrite=true to recreate it." >&2
            exit 1
          fi
          if [ -d "$target_dir" ] && [ "$overwrite" = "true" ]; then
            rm -rf "$target_dir"
          fi

          mkdir -p "$target_dir"

          for app in $programs; do
            case "$app" in
              svc1|svc2|svc3|svc4|svc5|svc6|svc7|svc8|svc9|svc10|svc11|svc12|svc13|svc14|svc15) ;;
              *) echo "Only business service manifests can be created here, invalid: $app" >&2; exit 1 ;;
            esac

            src="k8s/env0/${app}.yaml"
            dst="${target_dir}/${app}.yaml"
            if [ ! -f "$src" ]; then
              echo "Base manifest missing: $src" >&2
              exit 1
            fi

            cp "$src" "$dst"

            python - "$dst" "$app" "$set_env" "$owner" "$image_tag" <<'PY'
          import re
          import sys

          path, app, env, owner, tag = sys.argv[1:]
          text = open(path, encoding="utf-8").read()

          set_name = f"{app}-env{env}"
          # 1. 替换资源名称
          text = re.sub(rf"\bname: {app}\b", f"name: {set_name}", text)
          # 2. 替换环境变量中的环境 ID
          text = re.sub(r'env: "0"', f'env: "{env}"', text)
          text = re.sub(r'value: "0"', f'value: "{env}"', text)
          # 3. 替换镜像地址 (兼容不同 registry)
          text = re.sub(
              r'image: [^\s]+',
              f'image: ghcr.io/{owner}/gitops-lane-{app}:{tag}',
              text,
          )
          # 4. 替换下游调用地址
          text = re.sub(
              rf'value: "http://{app}:9000"',
              f'value: "http://{set_name}:9000"',
              text,
          )

          open(path, "w", encoding="utf-8", newline="\n").write(text)
          PY
          done

          cat > "${target_dir}/README.md" <<EOF
          # SET Environment ${set_env}

          Generated by GitHub Actions.

          Services:

          $(for app in $programs; do echo "- ${app}"; done)

          Each service uses:

          \`\`\`text
          SERVICE_ENV=${set_env}
          PUBLIC_ADDR=http://<service>-env${set_env}:9000
          \`\`\`

          Images use tag:

          \`\`\`text
          ${image_tag}
          \`\`\`
          EOF

          echo "target_dir=${target_dir}" >> "$GITHUB_OUTPUT"
          echo "programs=${programs}" >> "$GITHUB_OUTPUT"

      - name: Commit environment manifests
        shell: bash
        run: |
          if git diff --quiet -- k8s; then
            echo "No manifest changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s
          git commit -m "Create SET env ${{ inputs.set_env }}"
          git push
