apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc11
  labels:
    app: svc11
    env: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc11
      env: "0"
  template:
    metadata:
      labels:
        app: svc11
        env: "0"
    spec:
      containers:
        - name: svc11
          image: ghcr.io/bxl1015/gitops-lane-svc11:main
          imagePullPolicy: Always
          env:
            - name: SERVICE_NAME
              value: svc11
            - name: SERVICE_ENV
              value: "0"
            - name: LISTEN_ADDR
              value: ":9000"
            - name: PUBLIC_ADDR
              value: "http://svc11:9000"
            - name: REGISTRY_ADDR
              value: "http://registry:8080"
            - name: TENANT_LOOKUP_ADDR
              value: "http://tenant-lookup:8081"
          ports:
            - name: http
              containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: svc11
  labels:
    app: svc11
    env: "0"
spec:
  selector:
    app: svc11
    env: "0"
  ports:
    - name: http
      port: 9000
      targetPort: http