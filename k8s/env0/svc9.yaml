apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc9
  labels:
    app: svc9
    env: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc9
      env: "0"
  template:
    metadata:
      labels:
        app: svc9
        env: "0"
    spec:
      containers:
        - name: svc9
          image: local/
          ImagePullPolicy: Always
          env:
            - name: SERVICE_NAME
              value: svc9
            - name: SERVICE_ENV
              value: "0"
          resources:
            limits:
              memory: 128Mi
            requests:
              memory: 64Mi
          ports:
            - name: http
              containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: svc9
  labels:
    app: svc9
spec:
  selector:
    app: svc9
  ports:
    - protocol: TCP
      port: 9000
      targetPort: 9000


