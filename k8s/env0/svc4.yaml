apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc4
  labels:
    app: svc4
    env: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc4
      env: "0"
  template:
    metadata:
      labels:
        app: svc4
        env: "0"
    spec:
      containers:
        - name: svc4
          image: ghcr.io/bxl1015:svc4-main
          imagePullPolicy: Always
          env:
            - name: SERVICE_NAME
              value: svc4
            - name: SERVICE_ENV
              value: "0"
            - name: LISTEN_ADDR
              value: ":9000"
            - name: PUBLIC_ADDR
              value: "http://svc4:9000"
            - name: REGISTRY_ADDR
              value: "http://registry:8080"
            - name: TENANT_LOOKUP_ADDR
              value: "http://tenant-lookup:8081"
          ports:
            - name: http
              containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: svc4
  labels:
    app: svc4
    env: "0"
spec:
  selector:
    app: svc4
    env: "0"
  ports:
    - name: http
      port: 9000
      targetPort: http