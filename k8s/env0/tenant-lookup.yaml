apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-lookup
  labels:
    app: tenant-lookup
    env: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tenant-lookup
      env: "0"
  template:
    metadata:
      labels:
        app: tenant-lookup
        env: "0"
    spec:
      containers:
        - name: tenant-lookup
          image: hcbxl/gitops-lane-tenant-lookup:main
          imagePullPolicy: Always
          env:
            - name: TENANT_LOOKUP_LISTEN_ADDR
              value: ":8081"
            - name: TENANT_BINDINGS
              value: "alice=2,bob=2"
          ports:
            - name: http
              containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: tenant-lookup
  labels:
    app: tenant-lookup
    env: "0"
spec:
  selector:
    app: tenant-lookup
    env: "0"
  ports:
    - name: http
      port: 8081
      targetPort: http