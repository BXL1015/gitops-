apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  labels:
    app: registry
    env: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
      env: "0"
  template:
    metadata:
      labels:
        app: registry
        env: "0"
    spec:
      containers:
        - name: registry
          image: ghcr.io/bxl1015:registry-main
          imagePullPolicy: Always
          env:
            - name: REGISTRY_LISTEN_ADDR
              value: ":8080"
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  labels:
    app: registry
    env: "0"
spec:
  selector:
    app: registry
    env: "0"
  ports:
    - name: http
      port: 8080
      targetPort: http