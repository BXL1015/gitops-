apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-lookup
  labels:
    app: tenant-lookup
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tenant-lookup
  template:
    metadata:
      labels:
        app: tenant-lookup
    spec:
      containers:
        - name: tenant-lookup
          image: ghcr.io/bxl1015/gitops-lane-tenant-lookup:master
          imagePullPolicy: Always
          env:
            - name: TENANT_LOOKUP_LISTEN_ADDR
              value: ":8081"
            - name: TENANT_BINDINGS
              value: "alice=1,bob=2"
          ports:
            - name: http
              containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: tenant-lookup
  labels:
    app: tenant-lookup
spec:
  selector:
    app: tenant-lookup
  ports:
    - name: http
      port: 8081
      targetPort: http
