apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc7-env3
  labels:
    app: svc7
    env: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc7
      env: "3"
  template:
    metadata:
      labels:
        app: svc7
        env: "3"
    spec:
      containers:
        - name: svc7-env3
          image: ghcr.io/bxl1015/gitops-lane-svc7:latest-test
          imagePullPolicy: Always
          env:
            - name: SERVICE_NAME
              value: svc7
            - name: SERVICE_ENV
              value: "3"
            - name: LISTEN_ADDR
              value: ":9000"
            - name: PUBLIC_ADDR
              value: "http://svc7-env3:9000"
            - name: REGISTRY_ADDR
              value: "http://registry:8080"
            - name: TENANT_LOOKUP_ADDR
              value: "http://tenant-lookup:8081"
          ports:
            - name: http
              containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: svc7-env3
  labels:
    app: svc7
    env: "3"
spec:
  selector:
    app: svc7
    env: "3"
  ports:
    - name: http
      port: 9000
      targetPort: http