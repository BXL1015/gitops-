apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: all-services-subsets
spec:
  host: "*.default.svc.cluster.local" # ฦฅ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝะท๏ฟฝ๏ฟฝ๏ฟฝ
  subsets:
  - name: env0
    labels:
      env: "0"
  - name: env8
    labels:
      env: "8"
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: swimlane-router
spec:
  hosts:
  - "*"
  http:
  - match:
    - headers:
        X-Tenant:
          exact: "alice"
    route:
    - destination:
        host: svc3 # ๏ฟฝ๏ฟฝ svc3 ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟชสผ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝำพ๏ฟฝ๏ฟฝ
        subset: env8
      fallback: # Istio 1.15+ ึง๏ฟฝึป๏ฟฝอจ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ route ฤฃ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
        target:
          host: svc3
          subset: env0
  - route:
    - destination:
        host: svc3
        subset: env0
