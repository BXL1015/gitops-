apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc5-env8
  labels:
    app: svc5
    env: "8"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc5
      env: "8"
  template:
    metadata:
      labels:
        app: svc5
        env: "8"
    spec:
      containers:
        - name: svc5-env8
          image: ghcr.io/bxl1015/gitops-lane-svc5:dev
          imagePullPolicy: Always
          env:
            - name: SERVICE_NAME
              value: svc5
            - name: SERVICE_ENV
              value: "8"
            - name: LISTEN_ADDR
              value: ":9000"
            - name: PUBLIC_ADDR
              value: "http://svc5-env8:9000"
            - name: REGISTRY_ADDR
              value: "http://registry:8080"
            - name: TENANT_LOOKUP_ADDR
              value: "http://tenant-lookup:8081"
          ports:
            - name: http
              containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: svc5-env8
  labels:
    app: svc5
    env: "8"
spec:
  selector:
    app: svc5
    env: "8"
  ports:
    - name: http
      port: 9000
      targetPort: http