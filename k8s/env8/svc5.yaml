apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc5
  labels:
    app: svc5
    env: "8"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc5
      env: "8"
  template:
    metadata:
      labels:
        app: svc5
        env: "8"
    spec:
      containers:
        - name: svc5
          image: local/
          ImagePullPolicy: Always
          env:
            - name: SERVICE_NAME
              value: svc5
            - name: SERVICE_ENV
              value: "8"
          resources:
            limits:
              memory: 128Mi
            requests:
              memory: 64Mi
          ports:
            - name: http
              containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: svc5
  labels:
    app: svc5
spec:
  selector:
    app: svc5
  ports:
    - protocol: TCP
      port: 9000
      targetPort: 9000


